{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h2 class="mb-4">Change Password</h2>

    <div class="card shadow-sm p-4 rounded-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Update Password</button>
                <a href="{% url 'admin_profile' %}" class="btn btn-secondary">Back to Profile</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
