{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Loan System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'admin_panel/css/admin_style.css' %}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            animation: fadeIn 0.6s ease-in-out;
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: #fff;
            padding: 25px 20px;
            text-align: center;
        }
        .login-header i {
            font-size: 2.8rem;
        }
        .login-header h4 {
            margin-top: 10px;
            font-weight: 600;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            transition: all 0.2s ease-in-out;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 8px rgba(13, 110, 253, 0.3);
        }
        .btn-primary {
            border-radius: 10px;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            border: none;
            transition: transform 0.2s ease-in-out;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #0056b3, #520dc2);
        }
        .card-footer {
            font-size: 0.9rem;
            color: #6c757d;
        }
        .form-label i {
            margin-right: 6px;
            color: #6610f2;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="card login-card shadow-lg">
    <div class="login-header">
        <i class="bi bi-shield-lock-fill"></i>
        <h4>Admin Login</h4>
    </div>
    <div class="card-body p-4">
        <h5 class="mb-4 text-center text-secondary">Welcome back, please login</h5>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label fw-semibold"><i class="bi bi-person-fill"></i> Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label fw-semibold"><i class="bi bi-key-fill"></i> Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <!-- Forgot Password -->
            <div class="text-end mb-3">
                <a class="small text-decoration-none" href="{% url 'admin_reset_password' %}">
                    <i class="bi bi-question-circle"></i> Forgot Password?
                </a>
            </div>

            <!-- Submit -->
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </div>
        </form>
    </div>
    <div class="card-footer text-center bg-light py-3">
        <a href="{% url 'login' %}" class="text-decoration-none">
            <i class="bi bi-house-door-fill"></i> Home
        </a>
    </div>
</div>
</body>
</html>
